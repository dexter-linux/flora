<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Bouquet for Mideva</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at center, #14213d, #0b132b);
            font-family: 'Georgia', serif;
            overflow: hidden;
            transition: background 3s ease;
            user-select: none;
            touch-action: none; /* Prevents zooming on mobile taps */
        }

        #app {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #message-overlay {
            position: absolute;
            top: 40%;
            font-size: 3rem;
            color: #ffccd5;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.8);
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease;
            font-style: italic;
            z-index: 100;
        }

        .fade-in-out {
            animation: fadeInOut 5s forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        canvas {
            max-width: 100vw;
            max-height: 80vh;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="message-overlay">I love you Mideva</div>
    
    <div id="canvas-holder" onclick="handleInteraction(event)" ontouchstart="handleInteraction(event)">
        <canvas id="vaseCanvas" width="900" height="700"></canvas>
    </div>

    <audio id="bgm" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>
</div>

<script src="sketch.js"></script>
<script>
    function handleInteraction(e) {
        // Play music on first interaction (browser requirement)
        const audio = document.getElementById('bgm');
        if (audio.paused) audio.play();

        // Show Message
        const msg = document.getElementById('message-overlay');
        msg.classList.remove('fade-in-out');
        void msg.offsetWidth; // Trigger reflow
        msg.classList.add('fade-in-out');

        // Trigger Bubbles in JS
        if (typeof triggerBubbles === 'function') {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            triggerBubbles(x, y);
        }
    }
</script>
</body>
</html>
