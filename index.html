<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Majestic Cycle: Lilies & Doves</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at center, #14213d, #0b132b);
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            transition: background 3s ease;
            color: white;
        }

        #app {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #canvas-holder {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Glass glow effect behind the canvas */
        #canvas-holder::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 400px;
            background: rgba(162, 155, 254, 0.1);
            filter: blur(80px);
            z-index: -1;
        }

        #controls {
            margin-top: 30px;
            text-align: center;
        }

        #status-text {
            margin-bottom: 10px;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        button {
            padding: 12px 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 122, 162, 0.8);
            color: white;
            font-size: 14px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        button:hover {
            background: #ff4f87;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 79, 135, 0.4);
        }

        /* Responsive Canvas sizing */
        @media (max-width: 768px) {
            #vaseCanvas { width: 95vw !important; height: auto !important; }
        }
        @media (min-width: 769px) {
            #vaseCanvas { width: 900px !important; height: 550px !important; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="status-text">Watching the garden grow...</div>
    
    <div id="canvas-holder">
        <canvas id="vaseCanvas" width="900" height="550"></canvas>
    </div>

    <div id="controls">
        <button onclick="resetCycle()">Restart Life Cycle</button>
    </div>
</div>

<script src="sketch.js"></script>

<script>
    // Small helper to update the status text based on the JS state
    setInterval(() => {
        const status = document.getElementById('status-text');
        if (typeof state !== 'undefined') {
            status.innerText = "Current Phase: " + state;
        }
    }, 500);

    function resetCycle() {
        if (typeof initScene === 'function') {
            timer = 0;
            state = 'GROWING';
            initScene();
        }
    }
</script>

</body>
</html>
